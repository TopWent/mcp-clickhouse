name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - run: go mod download
      - run: go vet ./...
      - run: go test -race -count=1 -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - run: |
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w" \
            -o mcp-clickhouse \
            ./cmd/mcp-clickhouse
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-clickhouse-linux-amd64
          path: mcp-clickhouse
          retention-days: 7

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: mcp-clickhouse:ci
          build-args: |
            VERSION=ci-${{ github.sha }}
